services:
  backend:
  # This acctually looking for docker file in the server directory
    build: ./server
    container_name: backend
    # 
    restart: always
    # passes the environment variables to the container
    env_file:
      - server/.env
    ports:
      - "8080:8080"

  # frontend:
  #   # This acctually looking for docker file in the client directory
  #   build: ./client
  #   container_name: frontend
  #   restart: always
  #   # passes the environment variables to the container
  #   env_file:
  #     - client/.env
  #   ports:
  #     - "5173:5173"
  #   # depends on the backend container to start first
  #   depends_on:
  #     - backend


  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: "http://13.233.83.29:8080/api/v1"
    container_name: frontend
    restart: always
    env_file:
      - client/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend